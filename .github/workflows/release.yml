name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Build
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: cc-switch-tui
          target: ${{ matrix.target }}
          token: ${{ secrets.GITHUB_TOKEN }}
